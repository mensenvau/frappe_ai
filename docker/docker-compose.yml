# ---------------------------------------------------------------------------
# Databek platform — single-machine dev stack (Frappe v15, no ERPNext)
# ---------------------------------------------------------------------------
# The frappe/bench image ships only the `bench` CLI — no bench instance. On
# first run the entrypoint runs `bench init` (clones Frappe v15, builds a venv;
# several minutes ONCE) directly INTO the persisted volume, so the Python venv's
# absolute paths stay valid (no move). The host's apps/databek is bind-mounted and
# symlinked into the bench, so edits stay live and version-controlled.
#
#   docker compose up -d
#   docker compose logs -f backend     # watch first-run init (slow once)
#   open http://localhost:${HTTP_PORT}
# ---------------------------------------------------------------------------

services:
  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis-cache:
    image: redis:7-alpine
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:7-alpine
    volumes:
      - redis-queue-data:/data

  backend:
    image: frappe/bench:latest
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    environment:
      FRAPPE_BRANCH: ${FRAPPE_VERSION}
      SITE_NAME: ${SITE_NAME}
      DEVELOPER_MODE: ${DEVELOPER_MODE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: ${REDIS_CACHE}
      REDIS_QUEUE: ${REDIS_QUEUE}
      HTTP_PORT: ${HTTP_PORT}
    user: frappe
    ports:
      - "${HTTP_PORT}:8000"
    volumes:
      # Persisted bench ROOT (the parent). The entrypoint runs `bench init` into
      # ${this}/frappe-bench so bench creates that dir itself — venv paths stay
      # valid (no move). Init happens once; later runs reuse it.
      - bench-root:/home/frappe/bench-root
      # Databek apps, edited on the host; entrypoint symlinks each into the bench.
      - ../apps/databek:/home/frappe/apps-src/databek
      - ../apps/hr:/home/frappe/apps-src/hr
      - ../apps/crm:/home/frappe/apps-src/crm
      - ./scripts:/home/frappe/scripts:ro
    working_dir: /home/frappe
    entrypoint: ["bash", "/home/frappe/scripts/entrypoint.sh"]

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  bench-root:
